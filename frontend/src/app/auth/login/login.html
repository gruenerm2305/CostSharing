<section class="auth-wrap">
      <div class="atmo one"></div>
      <div class="atmo two"></div>

      <div class="auth-card panel">
        <div class="brand">
          <div class="logo">
            <span class="material-symbols-outlined">account_balance_wallet</span>
          </div>
          <h1>CostSharing</h1>
          <p>Please log in to manage your shared ledger.</p>
        </div>

        <div *ngIf="error()" class="alert alert-error">{{ error() }}</div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" formControlName="username" placeholder="Enter your username" />
            <small class="field-error" *ngIf="isFieldInvalid('username')">
              Please enter a valid username.
            </small>
          </div>

          <div class="form-group">
            <div class="label-row">
              <label class="form-label">Password</label>
            </div>
            <input type="password" class="form-control" formControlName="password" placeholder="••••••••" />
            <small class="field-error" *ngIf="isFieldInvalid('password')">
              Password must be at least 6 characters long.
            </small>
          </div>

          <button type="submit" class="btn btn-primary submit" [disabled]="!loginForm.valid || loading()">
            {{ loading() ? 'Logging in...' : 'Login' }}
          </button>
        </form>

        <p class="register-link">
          New to the platform?
          <a routerLink="/register">Create an account</a>
        </p>

        <div class="security-note">End-to-end encrypted recipe tracking</div>
      </div>
    </section>
