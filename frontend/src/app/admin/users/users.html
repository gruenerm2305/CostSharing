<section class="admin-page">
  <div class="admin-content">
      <header class="admin-header">
        <div>
          <p class="eyebrow">Admin Panel</p>
          <h2>User Management</h2>
        </div>
        <p class="count">Showing {{ users.length }} users</p>
      </header>

      <div class="user-list-shell" *ngIf="!isLoading; else loadingTemplate">
        <div class="list-head list-row">
          <span>User Identity</span>
          <span>System Role</span>
          <span>Last Active</span>
          <span>Actions</span>
        </div>

        <article class="list-row" *ngFor="let user of users">
          <div class="identity-col">
            <div class="avatar">{{ initials(user) }}</div>
            <div>
              <h4>{{ displayName(user) }}</h4>
              <p>{{ user.username }}</p>
            </div>
          </div>

          <div class="role-col">
            <ng-container *ngIf="canManageRoles(); else staticRole">
              <div class="role-select-shell" [class.open]="isRoleMenuOpen(user.id)">
                <button
                  type="button"
                  class="role-trigger"
                  [disabled]="user.role === userRole.OWNER"
                  [attr.aria-expanded]="isRoleMenuOpen(user.id)"
                  [attr.aria-label]="'Change role for ' + displayName(user)"
                  (click)="toggleRoleMenu(user.id)"
                >
                  <span class="role-chip" [attr.data-tone]="roleTone(user.role)">{{ roleLabel(user.role) }}</span>
                  <span class="role-caret"></span>
                </button>

                <div class="role-menu" *ngIf="isRoleMenuOpen(user.id)">
                  <button
                    type="button"
                    class="role-option"
                    [class.selected]="user.role === userRole.USER"
                    (click)="selectRole(user, userRole.USER)"
                  >
                    <span>User</span>
                    <span class="option-dot"></span>
                  </button>
                  <button
                    type="button"
                    class="role-option"
                    [class.selected]="user.role === userRole.ADMIN"
                    (click)="selectRole(user, userRole.ADMIN)"
                  >
                    <span>Admin</span>
                    <span class="option-dot"></span>
                  </button>
                  <button
                    type="button"
                    class="role-option"
                    [class.selected]="user.role === userRole.OWNER"
                    (click)="selectRole(user, userRole.OWNER)"
                  >
                    <span>Owner</span>
                    <span class="option-dot"></span>
                  </button>
                </div>
              </div>
            </ng-container>
            <ng-template #staticRole>
              <span class="role-pill">{{ user.role }}</span>
            </ng-template>
          </div>

          <div class="meta-cell">
            {{ relativeTime(user.updatedAt ?? user.createdAt) }}
          </div>

          <div class="actions-col">
            <button
              type="button"
              class="delete-btn"
              [disabled]="!canDelete(user)"
              (click)="deleteUser(user)"
              title="Delete user"
            >
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </article>

        <div class="empty-state" *ngIf="users.length === 0">
          No users found.
        </div>
      </div>

      <ng-template #loadingTemplate>
        <div class="loading">Loading users...</div>
      </ng-template>
      </div>
    </section>
