services:
  db:
    image: postgres:16-alpine
    container_name: costtracking_db
    environment:
      POSTGRES_DB: costtracking
      POSTGRES_USER: costtracking_user
      POSTGRES_PASSWORD: hello
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    restart: unless-stopped

volumes:
  pg_data: