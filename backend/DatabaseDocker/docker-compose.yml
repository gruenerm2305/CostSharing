services:
  db:
    image: postgres:16-alpine
    container_name: costtracking_db
    environment:
      POSTGRES_DB: costtracking
      POSTGRES_USER: costtracking_user
      POSTGRES_PASSWORD: hello
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data: