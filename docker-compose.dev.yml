services:
  postgres:
    image: postgres:16-alpine
    container_name: costsharing-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: costtracking
      POSTGRES_USER: costtracking_user
      POSTGRES_PASSWORD: hello
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
      - ./backend/DatabaseDocker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - costsharing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: costsharing-backend-dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules_dev:/app/node_modules
      - backend_uploads_dev:/app/uploads
    networks:
      - costsharing-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: costsharing-frontend-dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    working_dir: /app
    command: npm run start -- --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    networks:
      - costsharing-network

volumes:
  pg_data_dev:
  backend_uploads_dev:
  backend_node_modules_dev:
  frontend_node_modules_dev:

networks:
  costsharing-network:
    driver: bridge
