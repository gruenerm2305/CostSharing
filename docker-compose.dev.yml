services:
  db:
    image: postgres:16-alpine
    container_name: costsharing_db_dev
    environment:
      POSTGRES_DB: costtracking
      POSTGRES_USER: costtracking_user
      POSTGRES_PASSWORD: hello
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
      - ./backend/DatabaseDocker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: costsharing_backend_dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://costtracking_user:hello@db:5432/costtracking
      NODE_ENV: development
      PORT: 3000
      FRONTEND_URL: http://localhost:4200
    working_dir: /app
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules_dev:/app/node_modules
      - backend_uploads_dev:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: costsharing_frontend_dev
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    working_dir: /app
    command: npm run start -- --host 0.0.0.0 --port 4200
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    restart: unless-stopped

volumes:
  pg_data_dev:
  backend_node_modules_dev:
  frontend_node_modules_dev:
  backend_uploads_dev:
