services:
  postgres:
    image: postgres:16-alpine
    container_name: costsharing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: costtracking
      POSTGRES_USER: costtracking_user
      POSTGRES_PASSWORD: hello
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/DatabaseDocker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - costsharing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: costsharing-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://costtracking_user:hello@postgres:5432/costtracking
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - costsharing-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/docs",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: costsharing-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - costsharing-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  backend_uploads:

networks:
  costsharing-network:
    driver: bridge
